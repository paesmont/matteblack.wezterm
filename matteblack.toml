# Matteblack color scheme for Wezterm
# Based on matteblack.nvim by Taha Nejad
# vim:filetype=toml

[metadata]
name = "matteblack"

[colors]
background = "#0D0D0D"
foreground = "#EAEAEA"
cursor_bg = "#121212"
cursor_fg = "#F59E0B"
cursor_border = "#F59E0B"
selection_bg = "#262626"
selection_fg = "#FFFFFF"
scrollbar_thumb = "#333333"

# Tab bar
tab_bar_bg = "#0D0D0D"
tab_bar_active_tab_fg = "#EAEAEA"
tab_bar_active_tab_bg = "#121212"
tab_bar_inactive_tab_fg = "#8A8A8D"
tab_bar_inactive_tab_bg = "#0D0D0D"

# ANSI colors (array format - no comments allowed!)
ansi = [
  "#333333",
  "#B91C1C",
  "#059669",
  "#FBBF24",
  "#3B82F6",
  "#8D20B2",
  "#1EA7A0",
  "#EAEAEA",
]

# Bright colors (array format - no comments allowed!)
brights = [
  "#8A8A8D",
  "#DC2626",
  "#10B981",
  "#EFBF04",
  "#3B82F6",
  "#B027DE",
  "#1EA7A0",
  "#FFFFFF",
]
